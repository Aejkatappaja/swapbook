name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  go:
    name: go (${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ["1.22", "stable"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: false
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"; echo "$unformatted"; exit 1
          fi
      - run: go vet ./...
      - run: go build ./...
      - run: go test -race ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: false
      - uses: golangci/golangci-lint-action@v7
        with:
          version: latest

  js:
    name: ui (jsdom + typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: test/ui/package-lock.json
      - name: install
        working-directory: test/ui
        run: npm ci
      - name: jsdom tests
        working-directory: test/ui
        run: npm test
      - name: typecheck UI (JSDoc + checkJs)
        run: npx -y -p typescript tsc -p cmd/swapbook/ui/jsconfig.json

  php:
    name: php adapter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
      - run: php adapters/php/swapbook_test.php

  e2e:
    name: e2e probes (playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: false
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: test/e2e/package-lock.json
      - name: install
        working-directory: test/e2e
        run: npm ci
      - name: install chromium
        working-directory: test/e2e
        run: npx playwright install --with-deps chromium
      - name: run probe e2e (real Turbo/Unpoly/Datastar behind the binary)
        working-directory: test/e2e
        run: npm test

  smoke:
    name: protocol smoke (python/node/ruby)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: false
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
      - run: gem install webrick --no-document # dropped from Ruby's default gems in 3.0
      - run: bash examples/smoke.sh
